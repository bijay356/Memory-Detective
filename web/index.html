<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="memory_detective">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>memory_detective</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      color-scheme: dark;
      background: #050914;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      background:
        radial-gradient(circle at 70% 20%, rgba(255, 193, 7, 0.14), transparent 28%),
        radial-gradient(circle at 30% 80%, rgba(0, 188, 212, 0.1), transparent 30%),
        #050914;
      overflow: hidden;
    }

    #detective-loader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      background:
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        radial-gradient(circle at 50% 28%, rgba(255, 193, 7, 0.16), transparent 30%),
        #050914;
      background-size: 42px 42px, 42px 42px, 100% 100%, 100% 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      transition: opacity 420ms ease, visibility 420ms ease;
    }

    #detective-loader.loader-hidden {
      opacity: 0;
      visibility: hidden;
    }

    .loader-card {
      width: min(420px, calc(100vw - 42px));
      text-align: center;
      color: #f8fafc;
    }

    .detective-mark {
      width: 210px;
      height: 250px;
      margin: 0 auto 20px;
      filter: drop-shadow(0 30px 48px rgba(0, 0, 0, 0.55));
      animation: detective-float 2400ms ease-in-out infinite;
    }

    .loader-title {
      margin: 0;
      color: #f4b400;
      font-size: clamp(30px, 7vw, 48px);
      font-weight: 900;
      letter-spacing: 0;
      line-height: 0.95;
      text-transform: uppercase;
    }

    .loader-subtitle {
      margin: 12px 0 24px;
      color: rgba(226, 232, 240, 0.78);
      font-size: 14px;
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .loader-bar {
      width: min(290px, 72vw);
      height: 8px;
      margin: 0 auto;
      overflow: hidden;
      border-radius: 99px;
      background: rgba(148, 163, 184, 0.18);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    .loader-bar::before {
      content: "";
      display: block;
      width: 44%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #f4b400, #00bcd4);
      animation: loading-sweep 1300ms ease-in-out infinite;
    }

    @keyframes loading-sweep {
      0% {
        transform: translateX(-105%);
      }
      100% {
        transform: translateX(235%);
      }
    }

    @keyframes detective-float {
      0%,
      100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-8px);
      }
    }
  </style>
</head>
<body>
  <div id="detective-loader" aria-label="Loading Memory Detective">
    <div class="loader-card">
      <svg class="detective-mark" viewBox="0 0 220 260" role="img" aria-label="Detective in black suit and black hat">
        <defs>
          <radialGradient id="lampGlow" cx="50%" cy="20%" r="70%">
            <stop offset="0%" stop-color="#f4b400" stop-opacity="0.42"/>
            <stop offset="100%" stop-color="#f4b400" stop-opacity="0"/>
          </radialGradient>
          <linearGradient id="coat" x1="0%" x2="100%">
            <stop offset="0%" stop-color="#070b12"/>
            <stop offset="50%" stop-color="#141a24"/>
            <stop offset="100%" stop-color="#03050a"/>
          </linearGradient>
        </defs>
        <circle cx="110" cy="120" r="104" fill="url(#lampGlow)"/>
        <path d="M58 246c7-56 23-86 52-86s45 30 52 86H58Z" fill="url(#coat)"/>
        <path d="M89 172l21 70 21-70c-12 10-30 10-42 0Z" fill="#f4b400" opacity="0.9"/>
        <path d="M83 172l27 26 27-26-14 62h-26l-14-62Z" fill="#0b111b"/>
        <path d="M78 91c2-30 16-48 32-48s30 18 32 48c2 36-12 62-32 62S76 127 78 91Z" fill="#b78353"/>
        <path d="M76 93c7-24 23-37 48-40 13 9 20 22 22 40-8-11-18-16-31-16-16 0-29 5-39 16Z" fill="#070b12"/>
        <path d="M66 76h88l-9 21H75l-9-21Z" fill="#03050a"/>
        <path d="M82 41h56l9 38H73l9-38Z" fill="#0a0f18"/>
        <path d="M56 76h108c6 0 10 4 10 9s-4 9-10 9H56c-6 0-10-4-10-9s4-9 10-9Z" fill="#02040a"/>
        <path d="M83 111c16 8 38 8 54 0" fill="none" stroke="#111827" stroke-width="5" stroke-linecap="round"/>
        <circle cx="94" cy="101" r="4" fill="#101722"/>
        <circle cx="126" cy="101" r="4" fill="#101722"/>
        <path d="M43 226c9-32 28-56 55-72l12 88H58c-8 0-14-7-15-16Z" fill="#070b12"/>
        <path d="M177 226c-9-32-28-56-55-72l-12 88h52c8 0 14-7 15-16Z" fill="#070b12"/>
        <path d="M158 128l34 34" stroke="#f4b400" stroke-width="8" stroke-linecap="round"/>
        <circle cx="149" cy="119" r="27" fill="none" stroke="#f8fafc" stroke-width="9"/>
        <circle cx="149" cy="119" r="18" fill="rgba(0,188,212,0.14)" stroke="#00bcd4" stroke-width="2"/>
      </svg>
      <h1 class="loader-title">Memory Detective</h1>
      <p class="loader-subtitle">Loading case file</p>
      <div class="loader-bar" aria-hidden="true"></div>
    </div>
  </div>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
  <script>
    (function () {
      function hideLoader() {
        var loader = document.getElementById('detective-loader');
        if (!loader) return;
        loader.classList.add('loader-hidden');
        window.setTimeout(function () {
          if (loader.parentNode) loader.parentNode.removeChild(loader);
        }, 500);
      }

      window.addEventListener('flutter-first-frame', hideLoader);
      window.setTimeout(hideLoader, 12000);
    })();
  </script>
</body>
</html>
